# Replace placeholders, then:
#   oc apply -f openshift/quay-pull-secret.example.yaml -n marketing-intern
#   oc secrets link marketing-intern-pi quay-rh-ee-gsiyu --for=pull -n marketing-intern
#   oc secrets link default quay-rh-ee-gsiyu --for=pull -n marketing-intern
#
# Create the secret from CLI instead (recommended):
#   oc create secret docker-registry quay-rh-ee-gsiyu \
#     --docker-server=quay.io \
#     --docker-username='rh-ee-gsiyu+robotname' \
#     --docker-password='<robot-token>' \
#     -n marketing-intern

apiVersion: v1
kind: Secret
metadata:
  name: quay-rh-ee-gsiyu
  namespace: marketing-intern
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: |
    {
      "auths": {
        "quay.io": {
          "auth": "BASE64_OF_user:token"
        }
      }
    }
