apiVersion: apps/v1
kind: Deployment
metadata:
  name: marketing-intern
  labels:
    app: marketing-intern
spec:
  replicas: 1
  selector:
    matchLabels:
      app: marketing-intern
  template:
    metadata:
      labels:
        app: marketing-intern
    spec:
      serviceAccountName: marketing-intern-pi
      containers:
        - name: marketing-intern
          # Replace after you push to your registry, or patch with kustomize `images`
          image: marketing-intern:latest
          imagePullPolicy: Always
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: AGENT_EXEC_MODE
              value: openshift-job
            # Pi-agent Job pods receive OPENAI_API_KEY from this Secret (same namespace).
            - name: OPENAI_K8S_SECRET_NAME
              value: openai-api-calling
            - name: OPENAI_K8S_SECRET_KEY
              value: OPENAI_API_KEY
            # Pi-agent Job image (override default localhost/pi-agent:v1 from deploy/app/k8s_pi_job.py).
            # Use integrated registry or Quay after mirroring; link pull Secret if registry is private.
            - name: PI_AGENT_IMAGE
              value: quay.io/rh-ee-gsiyu/agent-skills:latest
            - name: PI_AGENT_IMAGE_PULL_POLICY
              value: Always
            # Qwen / OpenShift AI — OpenAI-compatible chat completions (same schema as OpenAI).
            # Set the HTTPS Route of your inference service + path /v1/chat/completions
            # (KServe/vLLM/TGIS often expose this). CHAT_MODEL must match the served model id.
            - name: CHAT_COMPLETIONS_URL
              value: ""
            - name: CHAT_MODEL
              value: ""
            - name: CHAT_TEMPERATURE
              value: "0.3"
            # If the endpoint does not require Authorization, set to "1"
            - name: CHAT_ALLOW_NO_AUTH
              value: "0"
            # Prefer a Secret for tokens; or rely on OPENAI_K8S_SECRET_NAME / OPENAI_API_KEY for Bearer.
            # - name: CHAT_API_KEY
            #   valueFrom:
            #     secretKeyRef:
            #       name: qwen-chat-credentials
            #       key: token
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
