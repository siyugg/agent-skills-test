apiVersion: apps/v1
kind: Deployment
metadata:
  name: marketing-intern
  labels:
    app: marketing-intern
spec:
  replicas: 1
  selector:
    matchLabels:
      app: marketing-intern
  template:
    metadata:
      labels:
        app: marketing-intern
    spec:
      serviceAccountName: marketing-intern-pi
      containers:
        - name: marketing-intern
          # Replace after you push to your registry, or patch with kustomize `images`
          image: marketing-intern:latest
          imagePullPolicy: Always
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: AGENT_EXEC_MODE
              value: openshift-job
            # Run agent (pi-agent Job) — OpenAI API only. Not used for Qwen chat.
            - name: OPENAI_K8S_SECRET_NAME
              value: openai-api-calling
            - name: OPENAI_K8S_SECRET_KEY
              value: OPENAI_API_KEY
            # Pi-agent Job image (override default localhost/pi-agent:v1 from deploy/app/k8s_pi_job.py).
            # Use integrated registry or Quay after mirroring; link pull Secret if registry is private.
            - name: PI_AGENT_IMAGE
              value: quay.io/rh-ee-gsiyu/agent-skills:latest
            - name: PI_AGENT_IMAGE_PULL_POLICY
              value: Always
            # Qwen chat — fills inbox/ via CHAT_* only (does not use OPENAI_*).
            # Base route + OpenAI-compatible path /v1/chat/completions.
            - name: CHAT_COMPLETIONS_URL
              value: "https://qwen3-8b-marketing-intern.apps.ocp.kr6vb.sandbox2859.opentlc.com/v1/chat/completions"
            # Must match the model id your serving runtime expects.
            - name: CHAT_MODEL
              value: "qwen3-8b"
            - name: CHAT_TEMPERATURE
              value: "0.3"
            # If the Qwen route returns 401/403, create a Secret with a Bearer token and set CHAT_API_KEY below,
            # or set CHAT_ALLOW_NO_AUTH to "1" only if the route allows unauthenticated inference.
            - name: CHAT_ALLOW_NO_AUTH
              value: "0"
            # - name: CHAT_API_KEY
            #   valueFrom:
            #     secretKeyRef:
            #       name: qwen-chat-credentials
            #       key: token
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
