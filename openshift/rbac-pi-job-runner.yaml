apiVersion: v1
kind: ServiceAccount
metadata:
  name: marketing-intern-pi
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: marketing-intern-pi-job
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create", "delete", "get", "list"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "delete", "get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  # Referencing Secret keys in Job pod specs (secretKeyRef).
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: marketing-intern-pi-job
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: marketing-intern-pi-job
subjects:
  - kind: ServiceAccount
    name: marketing-intern-pi
